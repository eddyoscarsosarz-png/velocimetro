<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VeloLima — Diagnóstico GPS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050810;color:#e0e0e0;font-family:'Courier New',monospace;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:12px;gap:10px}
h1{font-size:0.75rem;letter-spacing:0.3em;color:#00e5ff;text-align:center;padding:8px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:460px}
.card{background:#0d1117;border:1px solid #1e2a3a;border-radius:10px;padding:10px 14px}
.card-label{font-size:0.5rem;letter-spacing:0.2em;color:#4a6280;margin-bottom:4px}
.card-value{font-size:1rem;font-weight:700;color:#fff}
.card-value.green{color:#39ff14}
.card-value.red{color:#ff2244}
.card-value.yellow{color:#ffd600}
.card-value.cyan{color:#00e5ff}
.card-value.orange{color:#ff6b35}
.log-wrap{width:100%;max-width:460px;background:#0d1117;border:1px solid #1e2a3a;border-radius:10px;overflow:hidden;flex:1}
.log-header{padding:8px 14px;font-size:0.55rem;letter-spacing:0.2em;color:#4a6280;border-bottom:1px solid #1e2a3a;display:flex;justify-content:space-between;align-items:center}
.log-clear{font-size:0.5rem;color:#4a6280;cursor:pointer;padding:2px 8px;border:1px solid #1e2a3a;border-radius:4px}
.log-clear:hover{color:#fff;border-color:#4a6280}
.log-body{height:320px;overflow-y:auto;padding:6px 0}
.log-body::-webkit-scrollbar{width:3px}
.log-body::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:3px}
.log-line{font-size:0.52rem;padding:3px 14px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.log-time{color:#2a4060;flex:0 0 62px}
.log-text{flex:1;word-break:break-word}
.log-line.gps .log-text{color:#39ff14}
.log-line.warn .log-text{color:#ffd600}
.log-line.error .log-text{color:#ff2244}
.log-line.info .log-text{color:#00e5ff}
.log-line.bg .log-text{color:#a78bfa}
.log-line.beep .log-text{color:#ff6b35}
.log-line.sys .log-text{color:#4a6280}
.btn-row{display:flex;gap:8px;width:100%;max-width:460px}
.btn{flex:1;font-family:'Courier New',monospace;font-size:0.65rem;letter-spacing:0.15em;padding:13px 8px;border-radius:10px;border:1px solid;cursor:pointer;text-transform:uppercase;transition:all 0.2s;background:transparent}
.btn-start{border-color:#00e5ff;color:#00e5ff}
.btn-start.active{border-color:#ff2244;color:#ff2244}
.btn-export{border-color:#4a6280;color:#4a6280;flex:0 0 auto;padding:13px 16px}
.btn-export:hover{color:#fff;border-color:#fff}
.legend{width:100%;max-width:460px;display:flex;gap:10px;flex-wrap:wrap;padding:4px 0}
.leg{font-size:0.48rem;letter-spacing:0.08em;display:flex;align-items:center;gap:4px}
.leg-dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
</style>
</head>
<body>
<h1>🛰 VELOLIMA — DIAGNÓSTICO GPS SEGUNDO PLANO</h1>

<div class="grid">
  <div class="card">
    <div class="card-label">GPS</div>
    <div class="card-value cyan" id="dSpeed">INACTIVO</div>
  </div>
  <div class="card">
    <div class="card-label">AUDIO CTX</div>
    <div class="card-value" id="dAudio">--</div>
  </div>
  <div class="card">
    <div class="card-label">APP ESTADO</div>
    <div class="card-value green" id="dVisible">PRIMER PLANO</div>
  </div>
  <div class="card">
    <div class="card-label">TICK COUNTER</div>
    <div class="card-value" id="dTick">0</div>
  </div>
  <div class="card">
    <div class="card-label">GPS UPDATES (watch)</div>
    <div class="card-value green" id="dGpsCount">0</div>
  </div>
  <div class="card">
    <div class="card-label">LOOP UPDATES (activo)</div>
    <div class="card-value orange" id="dLoopCount">0</div>
  </div>
  <div class="card">
    <div class="card-label">ÚLTIMO GPS</div>
    <div class="card-value" id="dLastGps">--</div>
  </div>
  <div class="card">
    <div class="card-label">VOZ</div>
    <div class="card-value" id="dVoz">--</div>
  </div>
</div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#39ff14"></div><span style="color:#39ff14">GPS WATCH</span></div>
  <div class="leg"><div class="leg-dot" style="background:#ff6b35"></div><span style="color:#ff6b35">GPS LOOP</span></div>
  <div class="leg"><div class="leg-dot" style="background:#a78bfa"></div><span style="color:#a78bfa">FONDO</span></div>
  <div class="leg"><div class="leg-dot" style="background:#00e5ff"></div><span style="color:#00e5ff">INFO</span></div>
  <div class="leg"><div class="leg-dot" style="background:#ffd600"></div><span style="color:#ffd600">ALERTA</span></div>
  <div class="leg"><div class="leg-dot" style="background:#ff2244"></div><span style="color:#ff2244">ERROR</span></div>
</div>

<div class="log-wrap">
  <div class="log-header">
    <span>REGISTRO EN TIEMPO REAL</span>
    <span class="log-clear" onclick="clearLog()">LIMPIAR</span>
  </div>
  <div class="log-body" id="logBody"></div>
</div>

<div class="btn-row">
  <button class="btn btn-start" id="btnStart" onclick="toggle()">▶ INICIAR DIAGNÓSTICO</button>
  <button class="btn btn-export" onclick="exportLog()" title="Exportar log">💾</button>
</div>

<script>
let running=false, watchId=null;
let tickCount=0, gpsCount=0, loopCount=0;
let lastGpsTime=0;
let audioCtx=null, bgLoopTimer=null, tickTimer=null, gpsLoopTimer=null, vozTimer=null;
let wakeLock=null;
let logLines=[];

// ── TIEMPO ────────────────────────────────────────────────
function ts(){
  const n=new Date();
  return `[${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}]`;
}

// ── LOG ───────────────────────────────────────────────────
function log(text,type='sys'){
  const line={time:ts(),text,type};
  logLines.push(line);
  if(logLines.length>400) logLines.shift();
  const el=document.createElement('div');
  el.className=`log-line ${type}`;
  el.innerHTML=`<span class="log-time">${line.time}</span><span class="log-text">${text}</span>`;
  const body=document.getElementById('logBody');
  body.appendChild(el);
  body.scrollTop=body.scrollHeight;
}

function clearLog(){logLines=[];document.getElementById('logBody').innerHTML='';}

function exportLog(){
  const txt=logLines.map(l=>`${l.time} [${l.type.toUpperCase()}] ${l.text}`).join('\n');
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`diag_gps_${new Date().toISOString().slice(0,19).replace(/[:.]/g,'-')}.txt`;
  a.click();
}

// ── UI ────────────────────────────────────────────────────
function setCard(id,val,color=''){
  const el=document.getElementById(id);
  el.textContent=val;
  el.className='card-value'+(color?' '+color:'');
}

// ── AUDIO keep-alive ──────────────────────────────────────
function initAudio(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC){log('AudioContext NO soportado','error');return;}
    audioCtx=new AC();
    log(`✅ AudioContext creado — estado: ${audioCtx.state}`,'info');
    setCard('dAudio',audioCtx.state,'green');

    if('mediaSession' in navigator){
      try{
        navigator.mediaSession.metadata=new MediaMetadata({title:'VeloLima Diag',artist:'GPS Test'});
        navigator.mediaSession.playbackState='playing';
        ['play','pause','stop','seekbackward','seekforward'].forEach(a=>{
          try{navigator.mediaSession.setActionHandler(a,()=>{});}catch(e){}
        });
        log('✅ MediaSession registrada','info');
      }catch(e){log('⚠️ MediaSession error: '+e.message,'warn');}
    }

    function beep(){
      try{
        if(audioCtx.state==='suspended') audioCtx.resume();
        const osc=audioCtx.createOscillator();
        const g=audioCtx.createGain();
        g.gain.setValueAtTime(0.15,audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.08);
        osc.frequency.value=880; osc.type='sine';
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime+0.08);
        const isBg=document.hidden;
        log(`🔔 Beep keep-alive | audio=${audioCtx.state} | fondo=${isBg}`,'beep');
        setCard('dAudio',audioCtx.state,audioCtx.state==='running'?'green':'yellow');
      }catch(e){log('❌ Beep error: '+e.message,'error');}
    }
    beep();
    bgLoopTimer=setInterval(beep,25000);
    log('🎵 Primer beep emitido','info');
  }catch(e){log('❌ Audio init error: '+e.message,'error');}
}

// ── TICK — mide si setInterval sobrevive en fondo ─────────
function startTick(){
  tickTimer=setInterval(()=>{
    tickCount++;
    setCard('dTick',tickCount);
    const isBg=document.hidden;
    const audioState=audioCtx?audioCtx.state:'N/A';
    // Log cada 5 ticks (cada 25s)
    if(tickCount%5===0){
      log(`TICK ${tickCount} | ${isBg?'🌙 FONDO':'☀️ FRENTE'} | audio=${audioState}`,'bg');
    }
  },5000);
}

// ── VOZ — mide si speechSynthesis funciona en fondo ───────
function startVozTest(){
  let vozCount=0;
  vozTimer=setInterval(()=>{
    if(!running) return;
    vozCount++;
    try{
      if(window.speechSynthesis){
        if(window.speechSynthesis.paused) window.speechSynthesis.resume();
        const u=new SpeechSynthesisUtterance('voz');
        u.lang='es-PE'; u.volume=0.3; u.rate=1.2;
        u.onstart=()=>{
          const isBg=document.hidden;
          log(`🔊 Voz iniciada | fondo=${isBg}`,'info');
          setCard('dVoz','OK','green');
        };
        u.onend=()=>log('🔇 Voz terminó','sys');
        u.onerror=(e)=>{
          log(`❌ Voz error: ${e.error}`,'error');
          setCard('dVoz','ERROR','red');
        };
        window.speechSynthesis.speak(u);
      }
    }catch(e){log('❌ Voz exception: '+e.message,'error');}
  },30000); // cada 30s para no molestar
  log('🔊 Voz iniciada','info');
  setCard('dVoz','OK','green');
}

// ── GPS WATCH ─────────────────────────────────────────────
function startWatch(){
  if(!navigator.geolocation){log('❌ Geolocalización NO disponible','error');return;}
  log('🛰️ Iniciando GPS watchPosition...','info');
  watchId=navigator.geolocation.watchPosition(
    (pos)=>{
      lastGpsTime=Date.now();
      gpsCount++;
      const kmh=Math.max(0,(pos.coords.speed||0)*3.6);
      const acc=Math.round(pos.coords.accuracy);
      const isBg=document.hidden;
      setCard('dSpeed',Math.round(kmh)+' km/h','cyan');
      setCard('dGpsCount',gpsCount,'green');
      setCard('dLastGps',new Date().toLocaleTimeString());
      log(`📍 GPS #${gpsCount} | ${kmh.toFixed(1)} km/h | acc=${acc}m | ${isBg?'🌙 FONDO':'☀️ FRENTE'}`,'gps');
    },
    (err)=>{
      const msgs={1:'PERMISO DENEGADO',2:'SEÑAL NO DISPONIBLE',3:'TIMEOUT'};
      log(`⚠️ watchPosition err ${err.code}: ${msgs[err.code]||'desconocido'}`,'warn');
      if(err.code===1){log('❌ Permiso denegado — deteniendo','error');stopDiag();}
    },
    {enableHighAccuracy:true,maximumAge:0,timeout:10000}
  );
}

// ── GPS LOOP — getCurrentPosition activo cada 1.5s ────────
// Este es el mecanismo backup que debería seguir funcionando en fondo
function startGPSLoop(){
  log('🔄 Iniciando GPS loop activo (backup fondo)...','info');
  gpsLoopTimer=setInterval(()=>{
    if(!running) return;
    const sinceLastGps=Date.now()-lastGpsTime;
    // Solo actuar si watchPosition lleva +3s sin responder
    if(sinceLastGps<3000) return;
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        lastGpsTime=Date.now();
        loopCount++;
        const kmh=Math.max(0,(pos.coords.speed||0)*3.6);
        const acc=Math.round(pos.coords.accuracy);
        const isBg=document.hidden;
        const lag=Math.round(sinceLastGps/1000);
        setCard('dSpeed',Math.round(kmh)+' km/h','orange');
        setCard('dLoopCount',loopCount,'orange');
        setCard('dLastGps',new Date().toLocaleTimeString());
        log(`🔄 LOOP #${loopCount} | ${kmh.toFixed(1)} km/h | acc=${acc}m | lag=${lag}s | ${isBg?'🌙 FONDO':'☀️ FRENTE'}`,'beep');
      },
      (err)=>{
        // Timeout es normal, ignorar
        if(err.code!==3){
          log(`⚠️ Loop GPS err ${err.code}: ${err.message}`,'warn');
        }
      },
      {enableHighAccuracy:true,maximumAge:2000,timeout:4000}
    );
  },1500);
}

// ── VISIBILITYCHANGE ──────────────────────────────────────
document.addEventListener('visibilitychange',async()=>{
  if(document.hidden){
    setCard('dVisible','SEGUNDO PLANO','yellow');
    log('🌙 APP FUE AL FONDO','bg');
    // Reanudar audio si fue suspendido
    if(audioCtx&&audioCtx.state==='suspended'){
      try{await audioCtx.resume();log('✅ AudioContext reanudado','info');}catch(e){}
    }
  } else {
    setCard('dVisible','PRIMER PLANO','green');
    log('☀️ APP VOLVIÓ AL FRENTE — recuperando estado...','info');
    log('📋 Últimas 5 entradas mientras estabas en fondo:','sys');
    // Re-adquirir wake lock
    try{if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen');}catch(e){}
    // Reactivar audio
    if(audioCtx&&audioCtx.state==='suspended'){
      try{await audioCtx.resume();setCard('dAudio',audioCtx.state,'green');}catch(e){}
    }
  }
});

// ── PERMISOS ──────────────────────────────────────────────
async function requestPerms(){
  if('Notification' in window){
    const r=await Notification.requestPermission();
    log(`${r==='granted'?'✅':'❌'} Notificaciones: ${r.toUpperCase()}`,'info');
  }
  if('wakeLock' in navigator){
    try{
      wakeLock=await navigator.wakeLock.request('screen');
      log('✅ Wake Lock adquirido — pantalla no se apagará','info');
    }catch(e){log('⚠️ Wake Lock no disponible: '+e.message,'warn');}
  } else {
    log('⚠️ Wake Lock NO soportado en este navegador','warn');
  }
}

// ── TOGGLE ────────────────────────────────────────────────
async function toggle(){
  if(running){stopDiag();}else{await startDiag();}
}

async function startDiag(){
  clearLog();
  tickCount=0; gpsCount=0; loopCount=0;
  lastGpsTime=Date.now();
  running=true;
  document.getElementById('btnStart').textContent='⏹ DETENER';
  document.getElementById('btnStart').classList.add('active');

  log(`Dispositivo: ${navigator.userAgent.slice(0,80)}`,'sys');
  log(`Hora: ${new Date().toLocaleString()}`,'sys');

  await requestPerms();
  initAudio();
  startWatch();
  startGPSLoop();
  startTick();
  startVozTest();

  log('──── Ahora MINIMIZA la app y espera 30 segundos ────','warn');
  log('──── Luego vuelve y verás qué siguió funcionando ────','warn');
}

function stopDiag(){
  running=false;
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  if(tickTimer){clearInterval(tickTimer);tickTimer=null;}
  if(bgLoopTimer){clearInterval(bgLoopTimer);bgLoopTimer=null;}
  if(gpsLoopTimer){clearInterval(gpsLoopTimer);gpsLoopTimer=null;}
  if(vozTimer){clearInterval(vozTimer);vozTimer=null;}
  if(audioCtx){try{audioCtx.suspend();}catch(e){}}
  document.getElementById('btnStart').textContent='▶ INICIAR DIAGNÓSTICO';
  document.getElementById('btnStart').classList.remove('active');
  setCard('dVisible','DETENIDO','red');
  log('──── DIAGNÓSTICO DETENIDO ────','error');
}

log('Esperando inicio del diagnóstico...','sys');
log('Presiona INICIAR → minimiza la app 30s → vuelve','sys');
</script>
</body>
</html>
